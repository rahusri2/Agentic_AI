<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#f4c542"/>
    </marker>
    <marker id="arrow-pink" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#e879a9"/>
    </marker>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1200" height="760" fill="#0f1117"/>

  <!-- title -->
  <text x="40" y="52" fill="#f0f0f0" font-size="28" font-weight="700">Agents &amp; ReAct  Training Reference</text>
  <text x="40" y="78" fill="#9ca3af" font-size="14">Expanded from your course diagram · LLM + Tool loop · GenAI app output</text>

  <!-- ========== MAIN DIAGRAM ========== -->
  <g transform="translate(320, 200)">
    <!-- LLM -->
    <rect x="120" y="80" width="140" height="72" rx="10" fill="#1a1d27" stroke="#4b5563" stroke-width="2" filter="url(#shadow)"/>
    <text x="190" y="125" fill="#f4c542" font-size="22" font-weight="700" text-anchor="middle">LLM</text>

    <!-- Tool -->
    <rect x="360" y="0" width="120" height="56" rx="10" fill="#2a1520" stroke="#e879a9" stroke-width="2"/>
    <text x="420" y="35" fill="#e879a9" font-size="18" font-weight="700" text-anchor="middle">Tool</text>

    <!-- I/p -->
    <line x1="0" y1="116" x2="120" y2="116" stroke="#f4c542" stroke-width="3" marker-end="url(#arrow-gold)"/>
    <text x="55" y="105" fill="#f4c542" font-size="14" font-weight="700" text-anchor="middle">I/p</text>

    <!-- O/p -->
    <line x1="260" y1="116" x2="480" y2="116" stroke="#f4c542" stroke-width="3" marker-end="url(#arrow-gold)"/>
    <text x="385" y="105" fill="#f4c542" font-size="14" font-weight="700" text-anchor="middle">O/p</text>

    <!-- Action (LLM -> Tool) -->
    <path d="M 220 80 Q 300 20 360 28" fill="none" stroke="#e879a9" stroke-width="2.5" marker-end="url(#arrow-pink)"/>
    <text x="285" y="42" fill="#e879a9" font-size="13" font-weight="700">Action</text>

    <!-- Context (Tool -> LLM) -->
    <path d="M 420 56 Q 350 150 250 145" fill="none" stroke="#e879a9" stroke-width="2.5" marker-end="url(#arrow-pink)"/>
    <text x="340" y="118" fill="#e879a9" font-size="13" font-weight="700">Context</text>

    <!-- labels -->
    <text x="190" y="195" fill="#e879a9" font-size="16" font-weight="700" text-anchor="middle">Basic Agent</text>
    <text x="500" y="125" fill="#e879a9" font-size="15" font-weight="600">GenAI App</text>
    <text x="-40" y="210" fill="#f97316" font-size="14" font-style="italic">e.g. "Today's AI News"</text>
  </g>

  <!-- ReAct badge -->
  <rect x="40" y="230" width="110" height="48" rx="8" fill="#1f2937" stroke="#f0f0f0" stroke-width="1.5"/>
  <text x="95" y="260" fill="#f0f0f0" font-size="18" font-weight="700" text-anchor="middle">ReAct</text>
  <text x="95" y="295" fill="#9ca3af" font-size="12" text-anchor="middle">Reason + Act</text>

  <!-- ========== LEFT: What is an Agent? ========== -->
  <text x="40" y="360" fill="#f0f0f0" font-size="17" font-weight="700">What is an Agent?</text>
  <g fill="#9ca3af" font-size="13">
    <text x="48" y="388">" LLM alone = text in ’ text out (no live data).</text>
    <text x="48" y="414">" Agent = LLM + tools + loop until the task is done.</text>
    <text x="48" y="440">" Chooses WHEN to call a tool, WHICH tool, and how to use results.</text>
    <text x="48" y="466">" "Today's AI news" needs search/RSS  not model memory.</text>
    <text x="48" y="492">" Agent ` chatbot: it can plan, act, observe, and retry.</text>
  </g>

  <!-- ========== RIGHT: ReAct steps ========== -->
  <text x="620" y="360" fill="#f0f0f0" font-size="17" font-weight="700">ReAct loop (step by step)</text>
  <g font-size="13">
    <text x="628" y="388" fill="#e879a9" font-weight="700">Thought</text>
    <text x="710" y="388" fill="#9ca3af">Plan: "I need current news  use a search tool."</text>
    <text x="628" y="418" fill="#e879a9" font-weight="700">Action</text>
    <text x="710" y="418" fill="#9ca3af">Invoke tool with args (query, filters, API).</text>
    <text x="628" y="448" fill="#e879a9" font-weight="700">Observation</text>
    <text x="730" y="448" fill="#9ca3af">Tool output ’ Context fed back to the LLM.</text>
    <text x="628" y="478" fill="#e879a9" font-weight="700">Repeat</text>
    <text x="710" y="478" fill="#9ca3af">Until enough context ’ final Answer (O/p).</text>
  </g>

  <!-- ========== BOTTOM: LangChain ========== -->
  <rect x="40" y="530" width="1120" height="190" rx="12" fill="#141820" stroke="#4b5563" stroke-width="1.5"/>
  <text x="60" y="565" fill="#f4c542" font-size="16" font-weight="700">LangChain mapping (for your labs)</text>
  <g fill="#9ca3af" font-size="13">
    <text x="60" y="595">" ChatOpenAI / ChatGroq / ChatGoogleGenerativeAI ’ LLM box</text>
    <text x="60" y="622">" @tool, StructuredTool, Tavily/SerpAPI ’ Tool box (search, calc, DB, etc.)</text>
    <text x="60" y="649">" create_react_agent + AgentExecutor ’ runs Thought ’ Action ’ Observation loop</text>
    <text x="60" y="676">" Messages: HumanMessage ’ AIMessage (tool_calls) ’ ToolMessage (context) ’ final AIMessage</text>
    <text x="60" y="703">" load_dotenv() + OPENAI_API_KEY in .env ’ credentials for OpenAI-backed agents</text>
  </g>

  <text x="1160" y="745" fill="#6b7280" font-size="11" text-anchor="end">Langchain study · agents-react-reference.svg</text>
</svg>
