<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="system-ui, -apple-system, Segoe UI, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <path d="M0,0 L9,3 L0,6 Z" fill="#374151"/>
    </marker>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="108%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="900" height="720" fill="#ffffff"/>

  <text x="40" y="42" fill="#111827" font-size="24" font-weight="700">Guardrails Flow</text>
  <text x="40" y="68" fill="#6b7280" font-size="14">Middleware checkpoints before, during, and after the agent runs</text>

  <!-- User input -->
  <rect x="340" y="90" width="220" height="48" rx="8" fill="#f3f4f6" stroke="#374151" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="120" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">User input</text>

  <!-- L1 before_agent -->
  <line x1="450" y1="138" x2="450" y2="168" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="170" width="400" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="202" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">before_agent  input filter</text>

  <!-- blocked branch -->
  <line x1="250" y1="196" x2="130" y2="196" stroke="#374151" stroke-width="2"/>
  <line x1="130" y1="196" x2="130" y2="280" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="175" y="188" fill="#dc2626" font-size="12" font-weight="600">blocked</text>
  <rect x="40" y="282" width="180" height="48" rx="8" fill="#fef2f2" stroke="#dc2626" stroke-width="2" filter="url(#shadow)"/>
  <text x="130" y="312" fill="#111827" font-size="14" font-weight="600" text-anchor="middle">Safe refusal</text>

  <!-- pass to L2 -->
  <line x1="450" y1="222" x2="450" y2="262" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="470" y="248" fill="#059669" font-size="12" font-weight="600">pass</text>

  <!-- L2 before_model PII -->
  <rect x="250" y="264" width="400" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="296" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">before_model  PII on input</text>

  <!-- Agent -->
  <line x1="450" y1="316" x2="450" y2="346" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="280" y="348" width="340" height="56" rx="8" fill="#fffbeb" stroke="#d97706" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="382" fill="#111827" font-size="16" font-weight="700" text-anchor="middle">model Ä tools</text>

  <!-- L3 wrap_tool_call -->
  <line x1="450" y1="404" x2="450" y2="434" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="230" y="436" width="440" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="468" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">wrap_tool_call  human approval</text>

  <!-- L4 output PII -->
  <line x1="450" y1="488" x2="450" y2="518" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="230" y="520" width="440" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="552" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">after_model / output PII</text>

  <!-- L5 after_agent -->
  <line x1="450" y1="572" x2="450" y2="602" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="250" y="604" width="400" height="52" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="636" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">after_agent  output safety</text>

  <!-- User response -->
  <line x1="450" y1="656" x2="450" y2="676" stroke="#374151" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="310" y="678" width="280" height="0" fill="none"/>
  <rect x="310" y="658" width="280" height="48" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="2" filter="url(#shadow)"/>
  <text x="450" y="688" fill="#111827" font-size="15" font-weight="600" text-anchor="middle">User response</text>

  <!-- Legend -->
  <rect x="680" y="90" width="200" height="130" rx="8" fill="#f9fafb" stroke="#d1d5db" stroke-width="1"/>
  <text x="700" y="115" fill="#111827" font-size="13" font-weight="700">Legend</text>
  <rect x="700" y="128" width="18" height="14" rx="3" fill="#fff7ed" stroke="#ea580c"/>
  <text x="726" y="140" fill="#374151" font-size="12">Guardrail hook</text>
  <rect x="700" y="152" width="18" height="14" rx="3" fill="#fef2f2" stroke="#dc2626"/>
  <text x="726" y="164" fill="#374151" font-size="12">Blocked path</text>
  <rect x="700" y="176" width="18" height="14" rx="3" fill="#ecfdf5" stroke="#059669"/>
  <text x="726" y="188" fill="#374151" font-size="12">Safe output</text>

  <text x="860" y="708" fill="#9ca3af" font-size="11" text-anchor="end">guardrails-flow.svg</text>
</svg>
